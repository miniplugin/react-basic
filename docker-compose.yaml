version: "3"
services:
  client:
    container_name: client
    build: 
        context: .
        dockerfile: DockerfileClient
    image: kimilguk/react_map
    ports:
        - "80:3000"
  server:
    container_name: server
    build: 
        context: .
        dockerfile: DockerfileServer
    image: kimilguk/express_server
    ports:
        - "4000:4000"